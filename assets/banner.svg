<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="1200" height="360" font-family="'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6d28d9"/>
      <stop offset="55%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#9333ea"/>
    </linearGradient>
    <radialGradient id="berry" cx="0.35" cy="0.3" r="0.85">
      <stop offset="0%" stop-color="#f5d0fe"/>
      <stop offset="55%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#7e22ce"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#3b0764" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="360" rx="28" fill="url(#bg)"/>

  <!-- 은은한 배경 장식 원 -->
  <circle cx="1080" cy="70" r="120" fill="#ffffff" opacity="0.06"/>
  <circle cx="1150" cy="300" r="90" fill="#ffffff" opacity="0.05"/>

  <!-- 포도송이: 위에서부터 채워지는 스토리 (채운 알 = 보라, 빈 알 = 점선 윤곽) -->
  <g filter="url(#soft)">
    <!-- 줄기 -->
    <path d="M200 66 q10 26 0 52" stroke="#a16207" stroke-width="7" fill="none" stroke-linecap="round"/>
    <!-- 잎 -->
    <path d="M200 74 q40 -26 66 2 q-30 24 -66 -2 z" fill="#4ade80" stroke="#16a34a" stroke-width="2.5"/>

    <!-- row 0 (5) - 채움 -->
    <g>
      <circle cx="96"  cy="130" r="26" fill="url(#berry)"/>
      <circle cx="148" cy="130" r="26" fill="url(#berry)"/>
      <circle cx="200" cy="130" r="26" fill="url(#berry)"/>
      <circle cx="252" cy="130" r="26" fill="url(#berry)"/>
      <circle cx="304" cy="130" r="26" fill="url(#berry)"/>
    </g>
    <!-- row 1 (4) - 채움 -->
    <g>
      <circle cx="122" cy="176" r="26" fill="url(#berry)"/>
      <circle cx="174" cy="176" r="26" fill="url(#berry)"/>
      <circle cx="226" cy="176" r="26" fill="url(#berry)"/>
      <circle cx="278" cy="176" r="26" fill="url(#berry)"/>
    </g>
    <!-- row 2 (3) - 절반 -->
    <g>
      <circle cx="148" cy="222" r="26" fill="url(#berry)"/>
      <circle cx="200" cy="222" r="26" fill="#f5f3ff" fill-opacity="0.18" stroke="#f5d0fe" stroke-width="3" stroke-dasharray="5 4"/>
      <circle cx="252" cy="222" r="26" fill="#f5f3ff" fill-opacity="0.18" stroke="#f5d0fe" stroke-width="3" stroke-dasharray="5 4"/>
    </g>
    <!-- row 3 (2) - 빈 -->
    <g>
      <circle cx="174" cy="268" r="26" fill="#f5f3ff" fill-opacity="0.18" stroke="#f5d0fe" stroke-width="3" stroke-dasharray="5 4"/>
      <circle cx="226" cy="268" r="26" fill="#f5f3ff" fill-opacity="0.18" stroke="#f5d0fe" stroke-width="3" stroke-dasharray="5 4"/>
    </g>
    <!-- row 4 (1) - 빈 -->
    <circle cx="200" cy="314" r="26" fill="#f5f3ff" fill-opacity="0.18" stroke="#f5d0fe" stroke-width="3" stroke-dasharray="5 4"/>

    <!-- 채운 알 광택 -->
    <ellipse cx="88"  cy="121" rx="7" ry="4.5" fill="#fdf4ff" opacity="0.85"/>
    <ellipse cx="140" cy="121" rx="7" ry="4.5" fill="#fdf4ff" opacity="0.85"/>
    <ellipse cx="192" cy="121" rx="7" ry="4.5" fill="#fdf4ff" opacity="0.85"/>
    <ellipse cx="114" cy="167" rx="7" ry="4.5" fill="#fdf4ff" opacity="0.85"/>
    <ellipse cx="166" cy="167" rx="7" ry="4.5" fill="#fdf4ff" opacity="0.85"/>
  </g>

  <!-- 타이틀 -->
  <text x="392" y="176" font-size="96" font-weight="800" fill="#ffffff" letter-spacing="-2">GrapeNote</text>
  <text x="396" y="230" font-size="30" font-weight="600" fill="#e9d5ff">Practice on video. Fill the grapes. 🍇</text>
  <text x="396" y="278" font-size="24" font-weight="500" fill="#c4b5fd">연습 영상으로 포도알을 채우는 온라인 악기 연습 진도 카드</text>

  <!-- 하단 스택 배지 -->
  <g font-size="19" font-weight="700" fill="#ede9fe">
    <rect x="396" y="300" width="118" height="34" rx="17" fill="#ffffff" opacity="0.12"/>
    <text x="455" y="323" text-anchor="middle">Next.js</text>
    <rect x="524" y="300" width="128" height="34" rx="17" fill="#ffffff" opacity="0.12"/>
    <text x="588" y="323" text-anchor="middle">Supabase</text>
    <rect x="662" y="300" width="112" height="34" rx="17" fill="#ffffff" opacity="0.12"/>
    <text x="718" y="323" text-anchor="middle">Vercel</text>
  </g>
</svg>
